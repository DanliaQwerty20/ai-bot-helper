spring:
  application:
    name: ai-legend-bot
  liquibase:
    change-log: liquibase/changelog.xml
    default-schema: ${spring.datasource.hikari.schema}
    liquibase-schema: ${spring.datasource.hikari.schema}
  datasource:
    hikari:
      schema: public
  profiles:
    active: dev

server:
  servlet:
    context-path: /${spring.application.name}
  port: 8080
  shutdown: graceful

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: true
  paths-to-match: /**

app:
  prompt:
    legend-review: |
      You are a strict senior IT interviewer.

      Analyze using STAR:
      - Situation
      - Task
      - Action
      - Result

      Evaluate:
      - clarity
      - technical depth
      - ownership
      - realism

      Give score from 1 to 10.

      RULES:
      - Be strict
      - Do not invent facts
      - 6 = weak
      - 7 = middle
      - 9 = strong senior

      OUTPUT JSON:
      {
        "problems": [],
        "improvements": [],
        "rewritten": "",
        "score": 0,
        "isStrong": false,
        "seniorComment": ""
      }

logging:
  level:
    by.system.aibothelper: DEBUG