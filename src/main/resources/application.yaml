spring:
  application:
    name: ai-legend-bot
  liquibase:
    change-log: liquibase/changelog.xml
    default-schema: ${spring.datasource.hikari.schema}
    liquibase-schema: ${spring.datasource.hikari.schema}
  datasource:
    hikari:
      schema: public
  profiles:
    active: dev

server:
  servlet:
    context-path: /${spring.application.name}
  port: 8080
  shutdown: graceful

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: true
  paths-to-match: /**

app:
  prompt:
    legend-review: |
      Ты — эйчар-эксперт. Оцени легенду и верни ТОЛЬКО JSON.
      
      НЕ пиши ничего до или после JSON.
      НЕ используй Markdown-разметку.
      НЕ добавляй комментарии.
      
      Формат ответа - строгий JSON:
      {
        "problems": ["проблема 1", "проблема 2"],
        "improvements": ["улучшение 1", "улучшение 2"],
        "rewritten": "улучшенная версия легенды",
        "score": 8,
        "isStrong": false,
        "seniorComment": "короткий комментарий"
      }
      
      Правила:
      - problems: список конкретных проблем (2-4 пункта)
      - improvements: список конкретных улучшений (2-4 пункта)  
      - rewritten: переписанная легенда в стиле STAR
      - score: число от 1 до 10
      - isStrong: true если score >= 9
      - seniorComment: не более 150 символов
      
      Легенда для оценки:
      %s

logging:
  level:
    by.system.aibothelper: DEBUG